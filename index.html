<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablet Prototypes — SafetyCulture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans', sans-serif;
      background: #e9edf6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 600px; width: 100%; }
    h1 { font-size: 24px; font-weight: 700; color: #1f2533; margin-bottom: 8px; letter-spacing: -0.5px; }
    p.subtitle { font-size: 14px; color: #545f70; margin-bottom: 32px; }
    .card-list { display: flex; flex-direction: column; gap: 12px; }
    a.card {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border: 1px solid #dbe0eb; border-radius: 12px;
      padding: 20px 24px; text-decoration: none; transition: all 150ms ease;
    }
    a.card:hover { border-color: #6559ff; box-shadow: 0 2px 8px rgba(101, 89, 255, 0.12); }
    .card-title { font-size: 16px; font-weight: 600; color: #1f2533; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: #545f70; }
    .card-arrow { color: #bfc6d4; flex-shrink: 0; margin-left: 16px; }
    a.card:hover .card-arrow { color: #6559ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tablet Prototypes</h1>
    <p class="subtitle">SafetyCulture iPad design explorations</p>
    <div class="card-list">
      <a class="card" href="Tablet-Kanban_prototype.html">
        <div>
          <div class="card-title">Kanban Board</div>
          <div class="card-desc">Actions in kanban view with drag-and-drop cards</div>
        </div>
        <svg class="card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="card" href="Tablet-Nav_prototype.html">
        <div>
          <div class="card-title">Navigation</div>
          <div class="card-desc">Multi-screen prototype with Home, Inspections, Actions</div>
        </div>
        <svg class="card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
